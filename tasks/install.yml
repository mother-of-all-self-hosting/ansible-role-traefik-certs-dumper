---
- name: Ensure Traefik certs dumper paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ traefik_certs_dumper_uid }}"
    group: "{{ traefik_certs_dumper_gid }}"
  with_items:
    - "{{ traefik_certs_dumper_base_path }}"
    - "{{ traefik_certs_dumper_bin_path }}"

- name: Ensure Traefik certs dumper dumped certificates path exists
  ansible.builtin.file:
    path: "{{ traefik_certs_dumper_dumped_certificates_path }}"
    state: directory
    mode: "{{ traefik_certs_dumper_dumped_certificates_dir_mode }}"
    owner: "{{ traefik_certs_dumper_dumped_certificates_dir_owner }}"
    group: "{{ traefik_certs_dumper_dumped_certificates_dir_group }}"

- name: Ensure Traefik certs dumper support file installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ traefik_certs_dumper_base_path }}/{{ item }}"
    mode: "0640"
    owner: "{{ traefik_certs_dumper_uid }}"
    group: "{{ traefik_certs_dumper_gid }}"
  with_items:
    - env
  register: traefik_certs_dumper_support_files_result

- name: Ensure Traefik certs dumper scripts installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/bin/{{ item }}"
    dest: "{{ traefik_certs_dumper_bin_path }}/{{ item }}"
    owner: "{{ traefik_certs_dumper_uid }}"
    group: "{{ traefik_certs_dumper_gid }}"
    mode: "0750"
  with_items:
    - wait-for-file.sh
    - wait-for-domain.sh
    - copy-certificates.sh
    - entrypoint.sh
  register: traefik_certs_dumper_scripts_result

- name: Ensure Traefik certs dumper container image is pulled via community.docker.docker_image
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image:
    name: "{{ traefik_certs_dumper_container_image }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ traefik_certs_dumper_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else traefik_certs_dumper_container_image_force_pull }}"
  register: traefik_certs_dumper_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: traefik_certs_dumper_container_image_pull_result_ansible_module is not failed

- name: Ensure Traefik certs dumper container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ traefik_certs_dumper_container_image }}"
  register: traefik_certs_dumper_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: traefik_certs_dumper_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in traefik_certs_dumper_container_image_pull_result_command.stdout"

- name: Ensure Traefik certs dumper systemd services are present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/{{ item.src }}"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ item.dest }}"
    mode: "0644"
  with_items:
    - src: traefik-certs-dumper.service.j2
      dest: "{{ traefik_certs_dumper_identifier }}.service"
    - src: traefik-certs-dumper-wait-for-domain@.service.j2
      dest: "{{ traefik_certs_dumper_identifier }}-wait-for-domain@.service"
  register: traefik_certs_dumper_systemd_service_result

- name: Determine whether Traefik certs dumper needs a restart
  ansible.builtin.set_fact:
    traefik_certs_dumper_restart_necessary: >-
      {{
        traefik_certs_dumper_support_files_result.changed | default(false)
        or traefik_certs_dumper_scripts_result.changed | default(false)
        or traefik_certs_dumper_systemd_service_result.changed | default(false)
        or traefik_certs_dumper_container_image_pull_result_ansible_module.changed | default(false)
        or traefik_certs_dumper_container_image_pull_result_command.changed | default(false)
      }}
